<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade Hub v5.0 LIGHT</title>
<style>
body{margin:0;background:#050510;color:#0ff;font-family:sans-serif;text-align:center;}
h1{text-shadow:0 0 20px #0ff;}
.bubbles{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;}
.bubble{width:95px;height:95px;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 15px #0ff;}
.bubble:hover{transform:scale(1.1);box-shadow:0 0 30px #0ff;}
canvas{background:#000;max-width:95%;display:block;margin:auto;}
.section{display:none;}
button{margin:5px;padding:10px;background:#111;color:#0ff;border:1px solid #0ff;}
#version{position:fixed;top:5px;right:10px;}
</style>
</head>
<body>

<div id="version">v5.0 LIGHT</div>
<h1>Welcome to my Kingdom</h1>

<div id="menu">
<div class="bubbles">
<div class="bubble" onclick="openGame('snake')">Snake</div>
<div class="bubble" onclick="openGame('pong')">Pong</div>
<div class="bubble" onclick="openGame('flappy')">Flappy</div>
<div class="bubble" onclick="openGame('reaction')">Reaction</div>
<div class="bubble" onclick="openGame('calc')">Calc</div>
<div class="bubble" onclick="openGame('magic')">8Ball</div>
<div class="bubble" onclick="openGame('credits')">Credits</div>
</div>
</div>

<button onclick="back()">⬅ Menu</button>

<!-- SNAKE -->
<div id="snake" class="section">
<canvas id="s" width="400" height="400"></canvas>
<h3 id="ss"></h3>
<button onclick="resetSnake()">Restart Snake</button>
</div>

<!-- PONG -->
<div id="pong" class="section">
<canvas id="p" width="400" height="400"></canvas>
<button onclick="resetPong()">Restart Pong</button>
</div>

<!-- FLAPPY -->
<div id="flappy" class="section">
<canvas id="f" width="300" height="500"></canvas>
<h3 id="fs"></h3>
<button onclick="resetFlappy()">Restart Flappy</button>
</div>

<!-- REACTION -->
<div id="reaction" class="section">
<h2 id="react">Press Start</h2>
<button onclick="startReaction()">Start</button>
</div>

<!-- CALCULATOR -->
<div id="calc" class="section">
<input id="ci">
<button onclick="calc()">=</button>
<h2 id="co"></h2>
</div>

<!-- MAGIC -->
<div id="magic" class="section">
<button onclick="ask()">Ask</button>
<h2 id="mo"></h2>
</div>

<!-- CREDITS -->
<div id="credits" class="section">
<h2>Me and Jed are terking off</h2>
</div>

<script>
// NAVIGATION
function openGame(id){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
menu.style.display='none';
document.getElementById(id).style.display='block';
}
function back(){
menu.style.display='block';
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
}

// SOUND
function beep(f=200){let a=new AudioContext(),o=a.createOscillator();o.frequency.value=f;o.connect(a.destination);o.start();o.stop(a.currentTime+0.1);}

// ------------------- SNAKE -------------------
let sCanvas=document.getElementById('s');
let sctx=sCanvas.getContext('2d');
let snake,dir,food,score;
function resetSnake(){
snake=[[80,80],[60,80],[40,80],[20,80]];
dir=[20,0];
food=[200,200];
score=0;
}
resetSnake();
function snakeLoop(){
sctx.clearRect(0,0,400,400);
sctx.fillStyle="lime";
snake.forEach(p=>sctx.fillRect(p[0],p[1],20,20));
sctx.fillStyle="red";
sctx.fillRect(food[0],food[1],20,20);

let head=[snake[0][0]+dir[0],snake[0][1]+dir[1]];
if(head[0]<0||head[1]<0||head[0]>=400||head[1]>=400||snake.some(p=>p[0]==head[0]&&p[1]==head[1])){
resetSnake();beep(100);}
snake.unshift(head);
if(head[0]==food[0]&&head[1]==food[1]){score++;food=[Math.floor(Math.random()*20)*20,Math.floor(Math.random()*20)*20];beep(400);}else snake.pop();
document.getElementById('ss').innerText="Score: "+score;
requestAnimationFrame(snakeLoop);
}
snakeLoop();
window.addEventListener('keydown',e=>{
if(e.key=="ArrowUp"&&dir[1]!=20)dir=[0,-20];
if(e.key=="ArrowDown"&&dir[1]!=-20)dir=[0,20];
if(e.key=="ArrowLeft"&&dir[0]!=20)dir=[-20,0];
if(e.key=="ArrowRight"&&dir[0]!=-20)dir=[20,0];
});

// ------------------- PONG -------------------
let pCanvas=document.getElementById('p');
let pctx=pCanvas.getContext('2d');
let px=200,py=200,pdx=3,pdy=3,ppad=150;
function resetPong(){px=200;py=200;pdx=3;pdy=3;ppad=150;}
function pongLoop(){
pctx.clearRect(0,0,400,400);
pctx.fillStyle="lime";
pctx.fillRect(ppad,380,80,10);
pctx.beginPath();pctx.arc(px,py,8,0,Math.PI*2);pctx.fill();
px+=pdx;py+=pdy;
if(px<0||px>400)pdx*=-1;
if(py<0)pdy*=-1;
if(py>380&&px>ppad&&px<ppad+80)pdy*=-1;
requestAnimationFrame(pongLoop);
}
pongLoop();
pCanvas.addEventListener('mousemove',e=>ppad=e.offsetX-40);

// ------------------- FLAPPY -------------------
let fy=200,fv=0,pipes=[],fscore=0;
function resetFlappy(){fy=200;fv=0;pipes=[];fscore=0;}
function flappyLoop(){
let c=f.getContext('2d');c.clearRect(0,0,300,500);
fv+=0.5;fy+=fv;if(Math.random()<0.02)pipes.push({x:300,g:Math.random()*200,passed:false});
pipes.forEach(p=>{p.x-=2;c.fillRect(p.x,0,30,p.g);c.fillRect(p.x,p.g+120,30,500);if(!p.passed&&p.x<50){fscore++;p.passed=true;beep(300);}if(50>p.x&&50<p.x+30&&(fy<p.g||fy>p.g+120)){resetFlappy();}});
c.beginPath();c.arc(50,fy,10,0,7);c.fill();
fs.innerText="Score: "+fscore;
requestAnimationFrame(flappyLoop);
}
flappyLoop();
onclick=()=>fv=-8;

// ------------------- REACTION -------------------
function startReaction(){
react.innerText="Wait...";
setTimeout(()=>{
react.innerText="CLICK!";
let t=Date.now();
document.onclick=function(){react.innerText=(Date.now()-t)+" ms";document.onclick=null;}
},Math.random()*2000+1000);
}

// ------------------- CALCULATOR -------------------
function calc(){
let val=ci.value.replace(/[^0-9+\-*/().]/g,"");
try{co.innerText=Function("return "+val)()+" HEMMY BOY";}catch{co.innerText="ERROR HEMMY BOY";}
}

// ------------------- MAGIC -------------------
function ask(){let arr=["Yes","No","Maybe","Definitely","Never"];mo.innerText=arr[Math.floor(Math.random()*arr.length)]+" HEMMY 😂🫱";}
</script>
</body>
</html>
