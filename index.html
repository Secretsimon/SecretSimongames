<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade Hub v1.9</title>
<style>
body{margin:0;background:#0f0f1f;color:#0ff;font-family:sans-serif;text-align:center;}
h1{text-shadow:0 0 10px #0ff;}
.bubbles{display:flex;flex-wrap:wrap;justify-content:center;gap:15px;}
.bubble{width:110px;height:110px;border-radius:50%;background:#1b1b35;
display:flex;align-items:center;justify-content:center;cursor:pointer;
box-shadow:0 0 15px #0ff;}
canvas{background:#000;margin:auto;display:block;max-width:95%;}
.section{display:none;}
button{padding:10px;margin:5px;}
#version{position:fixed;top:5px;right:10px;}
</style>
</head>
<body>

<div id="version">v1.9</div>

<div id="menu">
<h1>Welcome to my Kingdom</h1>
<div class="bubbles">
<div class="bubble" onclick="openGame('snake')">Snake</div>
<div class="bubble" onclick="openGame('pong')">Pong</div>
<div class="bubble" onclick="openGame('flappy')">Flappy</div>
<div class="bubble" onclick="openGame('breakout')">Breakout</div>
<div class="bubble" onclick="openGame('tetris')">Tetris</div>
<div class="bubble" onclick="openGame('doodle')">Doodle</div>
<div class="bubble" onclick="openGame('clicker')">Clicker</div>
<div class="bubble" onclick="openGame('memory')">Memory</div>
<div class="bubble" onclick="openGame('reaction')">Reaction</div>
<div class="bubble" onclick="openGame('calc')">Calc</div>
<div class="bubble" onclick="openGame('magic')">8Ball</div>
<div class="bubble" onclick="openGame('credits')">Credits</div>
</div>
</div>

<button onclick="back()">⬅</button>

<!-- SECTIONS -->
<div id="snake" class="section"><canvas id="s" width="400" height="400"></canvas></div>
<div id="pong" class="section"><canvas id="p" width="400" height="400"></canvas></div>
<div id="flappy" class="section"><canvas id="f" width="300" height="500"></canvas></div>
<div id="breakout" class="section"><canvas id="b" width="400" height="400"></canvas></div>
<div id="tetris" class="section"><canvas id="t" width="200" height="400"></canvas></div>
<div id="doodle" class="section"><canvas id="d" width="300" height="500"></canvas></div>
<div id="clicker" class="section"><h1 id="money">0</h1><button onclick="money+=1">Tap</button></div>
<div id="memory" class="section"><div id="mem"></div></div>
<div id="reaction" class="section"><button onclick="startReact()">Start</button><h2 id="react"></h2></div>
<div id="calc" class="section">
<input id="ci"><button onclick="co.innerText=eval(ci.value)+' HEMMY BOY'">=</button><h2 id="co"></h2>
</div>
<div id="magic" class="section">
<button onclick="magic()">Ask</button><h2 id="ma"></h2>
</div>
<div id="credits" class="section"><h2>Me and Jed are terking off</h2></div>

<script>
// NAV
function openGame(id){menu.style.display='none';document.querySelectorAll('.section').forEach(s=>s.style.display='none');document.getElementById(id).style.display='block';}
function back(){menu.style.display='block';document.querySelectorAll('.section').forEach(s=>s.style.display='none');}

// ---------------- SNAKE ----------------
let sctx=s.getContext('2d'),snake=[[80,80],[60,80],[40,80],[20,80]],dir=[20,0],food=[200,200];
function snakeGame(){
let head=[snake[0][0]+dir[0],snake[0][1]+dir[1]];
snake.unshift(head);
if(head[0]==food[0]&&head[1]==food[1])food=[Math.floor(Math.random()*20)*20,Math.floor(Math.random()*20)*20];
else snake.pop();
sctx.clearRect(0,0,400,400);
snake.forEach(p=>{sctx.fillStyle="#0ff";sctx.fillRect(p[0],p[1],20,20);});
sctx.fillStyle="#ff0";sctx.fillRect(food[0],food[1],20,20);
}
setInterval(snakeGame,120);
onkeydown=e=>{if(e.key=="ArrowUp")dir=[0,-20];if(e.key=="ArrowDown")dir=[0,20];if(e.key=="ArrowLeft")dir=[-20,0];if(e.key=="ArrowRight")dir=[20,0];}

// ---------------- PONG ----------------
let px=200,py=200,pdx=3,pdy=3,pyy=150;
function pong(){
let c=p.getContext('2d');c.clearRect(0,0,400,400);
c.fillRect(0,pyy,10,80);
c.beginPath();c.arc(px,py,8,0,7);c.fill();
px+=pdx;py+=pdy;
if(py<0||py>400)pdy*=-1;
if(px<10&&py>pyy&&py<pyy+80)pdx*=-1;
if(px>400)pdx*=-1;
requestAnimationFrame(pong);
}
pong();
p.onmousemove=e=>pyy=e.offsetY;

// ---------------- FLAPPY ----------------
let by=200,vel=0,pipes=[];
function flappy(){
let c=f.getContext('2d');c.clearRect(0,0,300,500);
vel+=0.5;by+=vel;
if(Math.random()<.02)pipes.push({x:300,g:Math.random()*200});
pipes.forEach(p=>{p.x-=2;c.fillRect(p.x,0,30,p.g);c.fillRect(p.x,p.g+100,30,500);});
c.beginPath();c.arc(50,by,10,0,7);c.fill();
requestAnimationFrame(flappy);
}
flappy();
onclick=()=>vel=-8;

// ---------------- BREAKOUT ----------------
let bx=200,by2=200,bdx=3,bdy=3,paddle=150;
let bricks=Array.from({length:5},(_,i)=>Array.from({length:8},(_,j)=>[j*50,i*20]));
function breakout(){
let c=b.getContext('2d');c.clearRect(0,0,400,400);
c.fillRect(paddle,380,80,10);
c.beginPath();c.arc(bx,by2,8,0,7);c.fill();
bx+=bdx;by2+=bdy;
if(by2>380&&bx>paddle&&bx<paddle+80)bdy*=-1;
if(bx<0||bx>400)bdx*=-1;if(by2<0)bdy*=-1;
bricks.flat().forEach(br=>{c.fillRect(br[0],br[1],40,10);});
requestAnimationFrame(breakout);
}
breakout();
b.onmousemove=e=>paddle=e.offsetX;

// ---------------- TETRIS (simple) ----------------
let tctx=t.getContext('2d');
setInterval(()=>{tctx.fillRect(Math.random()*200,0,20,20);},500);

// ---------------- DOODLE ----------------
let dy=400,vy=-5;
function doodle(){
let c=d.getContext('2d');c.clearRect(0,0,300,500);
vy+=.3;dy+=vy;
c.fillRect(140,dy,20,20);
if(dy>480)vy=-10;
requestAnimationFrame(doodle);
}
doodle();

// ---------------- CLICKER ----------------
let money=0;

// ---------------- MEMORY ----------------
let arr=[1,1,2,2,3,3].sort(()=>Math.random()-0.5);
mem.innerHTML=arr.map((n,i)=>`<button onclick="this.innerText=${n}">${n}</button>`).join('');

// ---------------- REACTION ----------------
function startReact(){
react.innerText="Wait...";
setTimeout(()=>{
let t=Date.now();
document.body.onclick=()=>react.innerText=(Date.now()-t)+" ms";
},Math.random()*3000);
}

// ---------------- MAGIC ----------------
function magic(){ma.innerText=["Yes","No","Maybe"][Math.floor(Math.random()*3)]+" HEMMY 😂🫱";}
</script>
</body>
</html>
