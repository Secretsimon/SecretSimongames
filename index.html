
<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secretsimo Games</title>
<style>
body {margin:0;font-family:Arial,sans-serif;background:#0f0f1f;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;}
h1 {text-align:center;font-size:2rem;margin:20px;color:#0ff;text-shadow:0 0 10px #0ff,0 0 20px #0ff;}
.bubble-container {display:flex;flex-wrap:wrap;justify-content:center;gap:20px;margin-top:40px;}
.bubble {background:#1b1b35;border-radius:50%;width:120px;height:120px;display:flex;align-items:center;justify-content:center;font-weight:bold;cursor:pointer;box-shadow:0 0 10px #0ff,0 0 20px #0ff;transition:transform 0.3s,box-shadow 0.3s;text-align:center;}
.bubble:hover {transform:scale(1.2);box-shadow:0 0 20px #ff0,0 0 40px #ff0;}
.game-section {display:none;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;width:100%;text-align:center;position:relative;}
.gear-button {position:fixed;top:20px;right:20px;background:#1b1b35;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#0ff;cursor:pointer;box-shadow:0 0 10px #0ff,0 0 20px #0ff;transition:transform 0.2s,box-shadow 0.2s;z-index:10;}
.gear-button:hover {transform:scale(1.2);box-shadow:0 0 20px #ff0,0 0 40px #ff0;}
canvas {background:#000;display:block;margin:0 auto;border:2px solid #0ff;}
input, button {font-family:Arial,sans-serif;}
@media (max-width:480px) {.bubble {width:100px;height:100px;font-size:0.9rem;} h1 {font-size:1.6rem;}}
</style>
</head>
<body>

<!-- Main UI -->
<div id="main-ui">
  <h1>Welcome to my Kingdom</h1>
  <div class="bubble-container">
    <div class="bubble" onclick="openGame('pong')">Pong</div>
    <div class="bubble" onclick="openGame('spaceinvaders')">Space Invaders</div>
    <div class="bubble" onclick="openGame('pacman')">Pac-Man</div>
    <div class="bubble" onclick="openGame('snake')">Snake</div>
    <div class="bubble" onclick="openGame('flappy')">Flappy Bird</div>
    <div class="bubble" onclick="openGame('calculator')">Calculator</div>
  </div>
</div>

<!-- Pong -->
<div class="game-section" id="pong">
  <h1>Pong</h1>
  <div class="gear-button" onclick="backToUI()">&#9881;</div>
  <canvas id="pongCanvas" width="300" height="200"></canvas>
</div>

<!-- Space Invaders -->
<div class="game-section" id="spaceinvaders">
  <h1>Space Invaders</h1>
  <div class="gear-button" onclick="backToUI()">&#9881;</div>
  <canvas id="spaceCanvas" width="300" height="200"></canvas>
</div>

<!-- Pac-Man -->
<div class="game-section" id="pacman">
  <h1>Pac-Man</h1>
  <div class="gear-button" onclick="backToUI()">&#9881;</div>
  <canvas id="pacCanvas" width="300" height="200"></canvas>
</div>

<!-- Snake -->
<div class="game-section" id="snake">
  <h1>Snake</h1>
  <div class="gear-button" onclick="backToUI()">&#9881;</div>
  <canvas id="snakeCanvas" width="300" height="200"></canvas>
</div>

<!-- Flappy Bird -->
<div class="game-section" id="flappy">
  <h1>Flappy Bird</h1>
  <div class="gear-button" onclick="backToUI()">&#9881;</div>
  <canvas id="flappyCanvas" width="300" height="400"></canvas>
</div>

<!-- Calculator -->
<div class="game-section" id="calculator">
  <h1>AI Calculator</h1>
  <div class="gear-button" onclick="backToUI()">&#9881;</div>
  <input type="text" id="calcInput" placeholder="Type math problem e.g. 6*7" style="padding:10px;font-size:1rem;width:80%;max-width:300px;margin-top:20px;">
  <button onclick="solveMath()" style="padding:10px 20px;margin-top:10px;font-size:1rem;cursor:pointer;background:#1b1b35;color:#0ff;border:none;box-shadow:0 0 10px #0ff;">Solve</button>
  <p id="calcOutput" style="margin-top:20px;color:#ff0;font-weight:bold;"></p>
</div>

<script>
/* Navigation */
function openGame(gameId){
  document.getElementById('main-ui').style.display='none';
  document.querySelectorAll('.game-section').forEach(s=>s.style.display='none');
  document.getElementById(gameId).style.display='flex';
}
function backToUI(){
  document.getElementById('main-ui').style.display='block';
  document.querySelectorAll('.game-section').forEach(s=>s.style.display='none');
}

/* Pong */
const pongCanvas=document.getElementById('pongCanvas');
const pCtx=pongCanvas.getContext('2d');
let paddleHeight=40,paddleWidth=10,ballRadius=5;
let x=pongCanvas.width/2,y=pongCanvas.height/2,dx=2,dy=2;
let paddleY=pongCanvas.height/2-20;
document.addEventListener("mousemove",e=>{let rect=pongCanvas.getBoundingClientRect();paddleY=e.clientY-rect.top-20;});
function drawPong(){
  pCtx.clearRect(0,0,pongCanvas.width,pongCanvas.height);
  pCtx.fillStyle="#0ff"; pCtx.fillRect(0,paddleY,paddleWidth,paddleHeight);
  pCtx.beginPath();pCtx.arc(x,y,ballRadius,0,Math.PI*2);pCtx.fillStyle="#ff0";pCtx.fill();pCtx.closePath();
  x+=dx;y+=dy;
  if(y+dy>pongCanvas.height-ballRadius||y+dy<ballRadius) dy=-dy;
  if(x+dx>pongCanvas.width-ballRadius) dx=-dx;
  if(x+dx<ballRadius+paddleWidth && y>paddleY && y<paddleY+paddleHeight) dx=-dx;
  if(x+dx<0) {x=pongCanvas.width/2;y=pongCanvas.height/2;dx=2;dy=2;}
  requestAnimationFrame(drawPong);
}
drawPong();

/* Snake */
const snakeCanvas=document.getElementById('snakeCanvas');
const sCtx=snakeCanvas.getContext('2d');
let box=10,dir='RIGHT',snake=[{x:50,y:50}],food={x:100,y:50};
document.addEventListener('keydown',e=>{if(e.key==='ArrowUp' && dir!=='DOWN') dir='UP';if(e.key==='ArrowDown' && dir!=='UP') dir='DOWN';if(e.key==='ArrowLeft' && dir!=='RIGHT') dir='LEFT';if(e.key==='ArrowRight' && dir!=='LEFT') dir='RIGHT';});
function drawSnake(){
  sCtx.clearRect(0,0,snakeCanvas.width,snakeCanvas.height);
  sCtx.fillStyle="#0ff"; snake.forEach(s=>sCtx.fillRect(s.x,s.y,box,box));
  sCtx.fillStyle="#ff0"; sCtx.fillRect(food.x,food.y,box,box);
  let head={x:snake[0].x,y:snake[0].y};
  if(dir==='LEFT') head.x-=box;if(dir==='RIGHT') head.x+=box;if(dir==='UP') head.y-=box;if(dir==='DOWN') head.y+=box;
  if(head.x===food.x && head.y===food.y){snake.unshift(head);food={x:Math.floor(Math.random()*30)*box,y:Math.floor(Math.random()*20)*box};} else snake.pop();
  snake.unshift(head);
  if(head.x<0||head.x>=snakeCanvas.width||head.y<0||head.y>=snakeCanvas.height) snake=[{x:50,y:50}];
  requestAnimationFrame(drawSnake);
}
drawSnake();

/* Space Invaders */
const spaceCanvas=document.getElementById('spaceCanvas');
const spCtx=spaceCanvas.getContext('2d');
let ship={x:130,y:180,width:40,height:10},bullets=[],invaders=[];
for(let i=0;i<5;i++)for(let j=0;j<3;j++)invaders.push({x:30+i*50,y:20+j*30,width:30,height:20});
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft') ship.x-=5;if(e.key==='ArrowRight') ship.x+=5;if(e.key===' ') bullets.push({x:ship.x+ship.width/2-2,y:ship.y-5,width:4,height:10});});
function drawSpace(){
  spCtx.clearRect(0,0,spaceCanvas.width,spaceCanvas.height);
  spCtx.fillStyle="#0ff"; spCtx.fillRect(ship.x,ship.y,ship.width,ship.height);
  spCtx.fillStyle="#ff0"; bullets.forEach(b=>{b.y-=5; spCtx.fillRect(b.x,b.y,b.width,b.height);});
  bullets=bullets.filter(b=>b.y>0);
  spCtx.fillStyle="#0f0"; invaders.forEach(i=>spCtx.fillRect(i.x,i.y,i.width,i.height));
  requestAnimationFrame(drawSpace);
}
drawSpace();

/* Pac-Man */
const pacCanvas=document.getElementById('pacCanvas');
const pcCtx=pacCanvas.getContext('2d');
let pac={x:150,y:100,r:10,dx:2,dy:2};
function drawPac(){
  pcCtx.clearRect(0,0,pacCanvas.width,pacCanvas.height);
  pcCtx.fillStyle="#ff0"; pcCtx.beginPath(); pcCtx.arc(pac.x,pac.y,pac.r,0.25*Math.PI,1.75*Math.PI); pcCtx.lineTo(pac.x,pac.y); pcCtx.fill(); pcCtx.closePath();
  pac.x+=pac.dx; pac.y+=pac.dy;
  if(pac.x+pac.r>pacCanvas.width||pac.x-pac.r<0) pac.dx=-pac.dx;
  if(pac.y+pac.r>pacCanvas.height||pac.y-pac.r<0) pac.dy=-pac.dy;
  requestAnimationFrame(drawPac);
}
drawPac();

/* Flappy Bird */
const flappyCanvas = document.getElementById('flappyCanvas');
const fCtx = flappyCanvas.getContext('2d');
let bird = {x:50, y:200, r:10, dy:0};
let gravity = 0.6;
let jump = -10;
let pipes = [];
let frame = 0;
document.addEventListener('keydown', e=>{ if(e.key===' ') bird.dy = jump; });
function drawFlappy(){
  fCtx.clearRect(0,0,flappyCanvas.width,flappyCanvas.height);
  // Bird
  bird.dy += gravity; bird.y += bird.dy;
  fCtx.fillStyle="#ff0"; fCtx.beginPath(); fCtx.arc(bird.x,bird.y,bird.r,0,Math.PI*2); fCtx.fill(); fCtx.closePath();
  // Pipes
  if(frame%90===0){ let topHeight = Math.random()*150+50; pipes.push({x:flappyCanvas.width,top:topHeight,gap:80}); }
  pipes.forEach(p=>{p.x-=2; fCtx.fillStyle="#0f0"; fCtx.fillRect(p.x,0,20,p.top); fCtx.fillRect(p.x,p.top+p.gap,20,flappyCanvas.height-(p.top+p.gap));});
  pipes = pipes.filter(p=>p.x+20>0);
  // Collision
  pipes.forEach(p=>{if(bird.x+bird.r>p.x && bird.x-bird.r<p.x+20 && (bird.y-bird.r<p.top || bird.y+bird.r>p.top+p.gap)) bird.y=200;});
  if(bird.y+bird.r>flappyCanvas.height || bird.y-bird.r<0) bird.y=200;
  frame++; requestAnimationFrame(drawFlappy);
}
drawFlappy();

/* AI Calculator */
function solveMath(){
  const input=document.getElementById('calcInput').value;
  let answer;
  try{ answer=eval(input); }catch(e){ answer='Invalid'; }
  document.getElementById('calcOutput').textContent=answer+' HEMMY';
}
</script>
</body>
</html>
