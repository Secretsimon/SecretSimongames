<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade v4.2 STABLE</title>

<style>
body{margin:0;background:#000;color:#0ff;font-family:sans-serif;text-align:center;}
.screen{display:none;}
canvas{background:#111;display:block;margin:auto;}
button{padding:10px;margin:5px;background:#111;color:#0ff;border:1px solid #0ff;}
#menu{display:block;}
</style>
</head>

<body>

<h1>Arcade v4.2</h1>

<div id="menu">
<button onclick="show('snake')">Snake</button>
<button onclick="show('pong')">Pong</button>
<button onclick="show('calc')">Calculator</button>
<button onclick="show('magic')">Magic 8</button>
</div>

<button onclick="back()">Menu</button>

<!-- SNAKE -->
<div id="snake" class="screen">
<canvas id="s" width="300" height="300"></canvas>
<h3 id="score"></h3>
</div>

<!-- PONG -->
<div id="pong" class="screen">
<canvas id="p" width="300" height="300"></canvas>
</div>

<!-- CALC -->
<div id="calc" class="screen">
<input id="ci">
<button onclick="calc()">=</button>
<h2 id="co"></h2>
</div>

<!-- MAGIC -->
<div id="magic" class="screen">
<button onclick="ask()">Ask</button>
<h2 id="mo"></h2>
</div>

<script>
// NAV
function show(id){
document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
menu.style.display='none';
document.getElementById(id).style.display='block';
}
function back(){
menu.style.display='block';
document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
}

// ---------- SNAKE (FIXED) ----------
let sctx=s.getContext('2d');
let snake=[[5,5],[4,5],[3,5],[2,5]];
let dir=[1,0];
let food=[10,10];
let size=15;

function snakeLoop(){
let head=[snake[0][0]+dir[0],snake[0][1]+dir[1]];

// collision
if(head[0]<0||head[1]<0||head[0]>=20||head[1]>=20 ||
snake.some(p=>p[0]==head[0]&&p[1]==head[1])){
snake=[[5,5],[4,5],[3,5],[2,5]];
dir=[1,0];
}

snake.unshift(head);

if(head[0]==food[0]&&head[1]==food[1]){
food=[Math.floor(Math.random()*20),Math.floor(Math.random()*20)];
}else snake.pop();

sctx.clearRect(0,0,300,300);
snake.forEach(p=>sctx.fillRect(p[0]*size,p[1]*size,size,size));
sctx.fillStyle="red";
sctx.fillRect(food[0]*size,food[1]*size,size,size);

score.innerText="Length: "+snake.length;
}
setInterval(snakeLoop,120);

onkeydown=e=>{
if(e.key=="ArrowUp"&&dir[1]!=1)dir=[0,-1];
if(e.key=="ArrowDown"&&dir[1]!=-1)dir=[0,1];
if(e.key=="ArrowLeft"&&dir[0]!=1)dir=[-1,0];
if(e.key=="ArrowRight"&&dir[0]!=-1)dir=[1,0];
};

// ---------- PONG ----------
let pctx=p.getContext('2d');
let bx=150,by=150,dx=3,dy=3,pad=120;

function pongLoop(){
pctx.clearRect(0,0,300,300);

pctx.fillRect(pad,280,60,10);
pctx.beginPath();pctx.arc(bx,by,6,0,7);pctx.fill();

bx+=dx;by+=dy;

if(bx<0||bx>300)dx*=-1;
if(by<0)dy*=-1;
if(by>280&&bx>pad&&bx<pad+60)dy*=-1;

requestAnimationFrame(pongLoop);
}
pongLoop();

p.onmousemove=e=>pad=e.offsetX;

// ---------- CALCULATOR (FIXED SAFE) ----------
function calc(){
let val=ci.value.replace(/[^0-9+\-*/().]/g,"");
try{
co.innerText=Function("return "+val)()+" HEMMY BOY";
}catch{
co.innerText="ERROR HEMMY BOY";
}
}

// ---------- MAGIC ----------
function ask(){
let arr=["Yes","No","Maybe","Definitely","Never"];
mo.innerText=arr[Math.floor(Math.random()*arr.length)]+" HEMMY 😂🫱";
}
</script>

</body>
</html>
