<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade Hub v4.0 GOD MODE</title>

<style>
body{
margin:0;
background:#050510;
color:#0ff;
font-family:sans-serif;
text-align:center;
}

h1{text-shadow:0 0 20px #0ff;}

.bubbles{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
}

.bubble{
width:100px;height:100px;
border-radius:50%;
background:#111;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 0 15px #0ff;
transition:.2s;
}
.bubble:hover{transform:scale(1.1);box-shadow:0 0 30px #0ff;}

canvas{background:#000;margin:auto;display:block;max-width:95%;}
.section{display:none;}
#version{position:fixed;top:5px;right:10px;}

button{padding:10px;margin:5px;background:#111;color:#0ff;border:1px solid #0ff;}
</style>
</head>

<body>

<div id="version">v4.0 GOD MODE</div>

<div id="menu">
<h1>Welcome to my Kingdom</h1>

<div class="bubbles">
<div class="bubble" onclick="openGame('snake')">Snake</div>
<div class="bubble" onclick="openGame('breakout')">Breakout</div>
<div class="bubble" onclick="openGame('flappy')">Flappy</div>
<div class="bubble" onclick="openGame('tetris')">Tetris</div>
<div class="bubble" onclick="openGame('doodle')">Doodle</div>
</div>
</div>

<button onclick="back()">⬅ Menu</button>

<!-- SECTIONS -->
<div id="snake" class="section">
<canvas id="s" width="400" height="400"></canvas>
<h3 id="ss"></h3>
<h4 id="sh"></h4>
<button onclick="resetSnake()">Restart</button>
</div>

<div id="breakout" class="section">
<canvas id="b" width="400" height="400"></canvas>
<h3 id="bs"></h3>
<h4 id="bh"></h4>
<button onclick="resetBreakout()">Restart</button>
</div>

<div id="flappy" class="section">
<canvas id="f" width="300" height="500"></canvas>
<h3 id="fs"></h3>
<h4 id="fh"></h4>
<button onclick="resetFlappy()">Restart</button>
</div>

<div id="tetris" class="section">
<canvas id="t" width="200" height="400"></canvas>
<button onclick="resetTetris()">Restart</button>
</div>

<div id="doodle" class="section">
<canvas id="d" width="300" height="500"></canvas>
<button onclick="resetDoodle()">Restart</button>
</div>

<script>
// 🔊 SIMPLE SOUND
function beep(freq=200,dur=0.1){
let ctx=new AudioContext();
let osc=ctx.createOscillator();
osc.frequency.value=freq;
osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+dur);
}

// NAV
function openGame(id){
menu.style.display='none';
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.getElementById(id).style.display='block';
}
function back(){
menu.style.display='block';
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
}

// 💾 SAVE
function save(key,val){localStorage.setItem(key,val);}
function load(key){return localStorage.getItem(key)||0;}

// ---------- SNAKE ----------
let sctx=s.getContext('2d');
let snake,dir,food,score;

function resetSnake(){
snake=[[80,80],[60,80],[40,80],[20,80]];
dir=[20,0];
food=[200,200];
score=0;
}
resetSnake();

setInterval(()=>{
let head=[snake[0][0]+dir[0],snake[0][1]+dir[1]];

if(head[0]<0||head[1]<0||head[0]>=400||head[1]>=400 ||
snake.some(p=>p[0]==head[0]&&p[1]==head[1])){
beep(100);
resetSnake();
return;
}

snake.unshift(head);

if(head[0]==food[0]&&head[1]==food[1]){
score++;
beep(400);
food=[Math.floor(Math.random()*20)*20,Math.floor(Math.random()*20)*20];
if(score>load("snakeHigh")) save("snakeHigh",score);
}else snake.pop();

sctx.clearRect(0,0,400,400);
snake.forEach(p=>sctx.fillRect(p[0],p[1],20,20));
sctx.fillStyle="yellow";sctx.fillRect(food[0],food[1],20,20);

ss.innerText="Score: "+score;
sh.innerText="High: "+load("snakeHigh");
},120);

onkeydown=e=>{
if(e.key=="ArrowUp"&&dir[1]!=20)dir=[0,-20];
if(e.key=="ArrowDown"&&dir[1]!=-20)dir=[0,20];
if(e.key=="ArrowLeft"&&dir[0]!=20)dir=[-20,0];
if(e.key=="ArrowRight"&&dir[0]!=-20)dir=[20,0];
};

// ---------- BREAKOUT ----------
let bctx=b.getContext('2d');
let bx,by,dx,dy,pad,bricks,bscore;

function resetBreakout(){
bx=200;by=200;dx=3;dy=3;pad=150;bscore=0;
bricks=[];
for(let i=0;i<5;i++)for(let j=0;j<8;j++)bricks.push({x:j*50,y:i*20,alive:1});
}
resetBreakout();

function breakout(){
bctx.clearRect(0,0,400,400);

bctx.fillRect(pad,380,80,10);
bctx.beginPath();bctx.arc(bx,by,8,0,7);bctx.fill();

bx+=dx;by+=dy;

if(bx<0||bx>400)dx*=-1;
if(by<0)dy*=-1;
if(by>400){beep(80);resetBreakout();}

if(by>380&&bx>pad&&bx<pad+80){dy*=-1;beep(200);}

bricks.forEach(br=>{
if(br.alive){
bctx.fillRect(br.x,br.y,40,10);
if(bx>br.x&&bx<br.x+40&&by>br.y&&by<br.y+10){
br.alive=0;dy*=-1;bscore++;beep(500);
if(bscore>load("breakHigh")) save("breakHigh",bscore);
}
}
});

bs.innerText="Score: "+bscore;
bh.innerText="High: "+load("breakHigh");

requestAnimationFrame(breakout);
}
breakout();
b.onmousemove=e=>pad=e.offsetX;

// ---------- FLAPPY ----------
let fy,fv,pipes,fscore;

function resetFlappy(){fy=200;fv=0;pipes=[];fscore=0;}
resetFlappy();

function flappy(){
let c=f.getContext('2d');
c.clearRect(0,0,300,500);

fv+=0.5;fy+=fv;

if(Math.random()<.02)pipes.push({x:300,g:Math.random()*200,passed:false});

pipes.forEach(p=>{
p.x-=2;
c.fillRect(p.x,0,30,p.g);
c.fillRect(p.x,p.g+120,30,500);

if(!p.passed && p.x<50){fscore++;p.passed=true;beep(400);}
if(50>p.x&&50<p.x+30&&(fy<p.g||fy>p.g+120)){
beep(100);resetFlappy();
}
});

c.beginPath();c.arc(50,fy,10,0,7);c.fill();

fs.innerText="Score: "+fscore;

requestAnimationFrame(flappy);
}
flappy();
onclick=()=>{fv=-8;beep(300);};

// ---------- TETRIS ----------
let tctx=t.getContext('2d');
let grid,piece;

function resetTetris(){
grid=Array.from({length:20},()=>Array(10).fill(0));
piece={x:4,y:0};
}
resetTetris();

setInterval(()=>{
piece.y++;
if(piece.y>=20||grid[piece.y][piece.x]){
grid[piece.y-1][piece.x]=1;
piece={x:4,y:0};
}
for(let y=19;y>=0;y--){
if(grid[y].every(v=>v)){
grid.splice(y,1);
grid.unshift(Array(10).fill(0));
beep(600);
}
}
drawT();
},300);

function drawT(){
tctx.clearRect(0,0,200,400);
for(let y=0;y<20;y++)
for(let x=0;x<10;x++)
if(grid[y][x])tctx.fillRect(x*20,y*20,20,20);
tctx.fillRect(piece.x*20,piece.y*20,20,20);
}

// ---------- DOODLE ----------
let dctx=d.getContext('2d');
let player,plats;

function resetDoodle(){
player={x:150,y:400,vy:-10};
plats=[];
for(let i=0;i<6;i++)plats.push({x:Math.random()*250,y:i*80});
}
resetDoodle();

function doodle(){
dctx.clearRect(0,0,300,500);

player.vy+=0.4;
player.y+=player.vy;

plats.forEach(p=>{
p.y+=1;
dctx.fillRect(p.x,p.y,60,10);

if(player.y+20>p.y&&player.y<p.y&&player.x>p.x&&player.x<p.x+60){
player.vy=-10;beep(300);
}
if(p.y>500){p.y=0;p.x=Math.random()*250;}
});

dctx.fillRect(player.x,player.y,20,20);

requestAnimationFrame(doodle);
}
doodle();
</script>
</body>
</html>
